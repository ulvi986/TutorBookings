{% extends 'core/base.html' %}
{% block content %}
<h2>Availability Management</h2>
<form method="post" class="card p-3 mb-3">{% csrf_token %}{{ form.as_p }}<button class="btn btn-primary">Add Slot</button></form>
<ul class="list-group">{% for s in slots %}<li class="list-group-item">{{ s.start_time }} - {{ s.end_time }}</li>{% empty %}<li class="list-group-item">No slots yet.</li>{% endfor %}</ul>
{% endblock %}
